<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Market Devils</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080c14; }
    @keyframes slideUp  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
    @keyframes blink    { 0%,100% { opacity:1; } 50% { opacity:.3; } }
    @keyframes shimmer  { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: #080c14; }
    ::-webkit-scrollbar-thumb { background: #1e2d42; border-radius: 2px; }
    input:focus { outline: none; }
    button { cursor: pointer; }
    button:active { transform: scale(.97); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── CONFIG ─────────────────────────────────────────────────────────────────
// Paste your Gemini API key here:
const GEMINI_API_KEY = AIzaSyBnfbbX9XT4FX1gwCddqDJKQu6Z8JCh4hg;

const ASSETS = [
  { id:"ALL",  label:"ALL",     flag:"🌐", color:"#e2e8f0" },
  { id:"NQ",   label:"NQ100",   flag:"🇺🇸", color:"#38bdf8" },
  { id:"EUR",  label:"EUR/USD", flag:"🇪🇺", color:"#4ade80" },
  { id:"GBP",  label:"GBP/USD", flag:"🇬🇧", color:"#fb923c" },
  { id:"JPY",  label:"USD/JPY", flag:"🇯🇵", color:"#f472b6" },
  { id:"GOLD", label:"XAU/USD", flag:"🥇",  color:"#fbbf24" },
  { id:"OIL",  label:"WTI Oil", flag:"🛢️",  color:"#f87171" },
];

const SIG = {
  LONG:  { color:"#4ade80", bg:"rgba(74,222,128,0.08)",  label:"LONG ▲" },
  SHORT: { color:"#f87171", bg:"rgba(248,113,113,0.08)", label:"SHORT ▼" },
  WAIT:  { color:"#fbbf24", bg:"rgba(251,191,36,0.08)",  label:"WAIT" },
  AVOID: { color:"#c084fc", bg:"rgba(192,132,252,0.08)", label:"AVOID" },
};

const TYPE_ICONS = {
  MACRO:"📊", POLITICAL:"🏛️", CENTRAL_BANK:"🏦",
  CORPORATE:"🏢", GEOPOLITICAL:"🌍", RISK_ON:"🟢", RISK_OFF:"🔴",
};

function makePrompt(assetLabel) {
  return `You are a senior institutional macro trader. Generate exactly 8 realistic financial market news items for ${assetLabel} traders. Context: May 2026, post-tariff environment, Fed holding rates, active geopolitical tensions.

RETURN ONLY A JSON ARRAY. No explanation. No markdown. No backticks. First char is [ last char is ].

Each object:
{
  "title": "specific headline with real numbers and names",
  "summary": "2 sentence factual description",
  "source": "Reuters or Bloomberg or FT or WSJ or CNBC",
  "time": "X min ago",
  "signal": "LONG or SHORT or WAIT or AVOID",
  "type": "MACRO or POLITICAL or CENTRAL_BANK or CORPORATE or GEOPOLITICAL or RISK_ON or RISK_OFF",
  "strength": 3,
  "confidence": 72,
  "urgency": "HIGH or MEDIUM or LOW",
  "timeframe": "0-15min or 15-60min or 1-4h or multi-day",
  "reasoning": "Two sentences in Russian about ${assetLabel} impact.",
  "bull": 21450,
  "bear": 20800,
  "risk": "One sentence in Russian.",
  "tickers": ["NVDA"],
  "sentiment": 65
}
Mix signals: some LONG, some SHORT, some WAIT. bull/bear can be null.`;
}

function extractJSON(raw) {
  if (!raw) return null;
  try { return JSON.parse(raw); } catch {}
  const s = raw.replace(/^```(?:json)?\s*/m,"").replace(/\s*```$/m,"").trim();
  try { return JSON.parse(s); } catch {}
  const ai = raw.indexOf("["), bi = raw.lastIndexOf("]");
  if (ai !== -1 && bi > ai) { try { return JSON.parse(raw.slice(ai, bi+1)); } catch {} }
  const ao = raw.indexOf("{"), bo = raw.lastIndexOf("}");
  if (ao !== -1 && bo > ao) { try { return JSON.parse("[" + raw.slice(ao, bo+1) + "]"); } catch {} }
  return null;
}

async function callGemini(systemPrompt, userMsg) {
  if (!GEMINI_API_KEY || GEMINI_API_KEY === "PASTE_YOUR_GEMINI_KEY_HERE") {
    throw new Error("Вставь Gemini API ключ в файл index.html (строка с PASTE_YOUR_GEMINI_KEY_HERE)");
  }
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: systemPrompt }] },
        contents: [{ parts: [{ text: userMsg }] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 4000 },
      }),
    }
  );
  const d = await res.json();
  if (d.error) throw new Error("Gemini: " + d.error.message);
  const text = d.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error("Пустой ответ от Gemini");
  return text.trim();
}

// ── Components ─────────────────────────────────────────────────────────────

function SentBar({ val }) {
  const v = Math.max(-100, Math.min(100, val || 0));
  const col = v > 20 ? "#4ade80" : v < -20 ? "#f87171" : "#fbbf24";
  const w = Math.abs(v) / 2;
  return (
    <div style={{position:"relative",height:2,background:"rgba(255,255,255,0.06)",borderRadius:2,marginTop:6}}>
      <div style={{position:"absolute",left:"50%",top:-1,width:1,height:4,background:"rgba(255,255,255,0.1)"}}/>
      <div style={{position:"absolute",top:0,left:v>=0?"50%":`${50-w}%`,width:`${w}%`,height:"100%",background:col,borderRadius:2}}/>
    </div>
  );
}

function Dots({ val, color }) {
  return (
    <div style={{display:"flex",gap:3}}>
      {[1,2,3,4,5].map(i => (
        <div key={i} style={{width:5,height:5,borderRadius:"50%",background:i<=val?color:"rgba(255,255,255,0.07)"}}/>
      ))}
    </div>
  );
}

function Card({ item, isNew }) {
  const [open, setOpen] = useState(false);
  const sig = SIG[item.signal] || SIG.WAIT;
  const icon = TYPE_ICONS[item.type] || "📰";
  return (
    <div onClick={() => setOpen(o => !o)} style={{
      background: open ? "rgba(255,255,255,0.03)" : "rgba(255,255,255,0.015)",
      border: `1px solid ${open ? "rgba(255,255,255,0.09)" : "rgba(255,255,255,0.04)"}`,
      borderLeft: `3px solid ${sig.color}`,
      borderRadius:12, padding:"14px 16px", marginBottom:8,
      cursor:"pointer", transition:"all .2s ease",
      animation: isNew ? "slideUp .4s ease" : "none",
    }}>
      <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:7}}>
            <span style={{background:sig.bg,color:sig.color,border:`1px solid ${sig.color}44`,borderRadius:5,padding:"2px 9px",fontSize:10,fontWeight:800}}>{sig.label}</span>
            <span style={{fontSize:10,color:"rgba(255,255,255,0.28)"}}>{icon} {(item.type||"").replace("_"," ")}</span>
            {item.urgency==="HIGH" && <span style={{fontSize:10,color:"#f87171",animation:"blink 1.5s infinite"}}>⚡HIGH</span>}
            <span style={{fontSize:10,color:"rgba(255,255,255,0.18)",marginLeft:"auto",whiteSpace:"nowrap"}}>{item.source} · {item.time}</span>
          </div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.82)",lineHeight:1.5,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:open?"normal":"nowrap"}}>{item.title}</div>
          {!open && item.summary && <div style={{fontSize:11,color:"rgba(255,255,255,0.28)",marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.summary}</div>}
          <SentBar val={item.sentiment}/>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5,flexShrink:0}}>
          <Dots val={item.strength||1} color={sig.color}/>
          <span style={{fontSize:11,fontWeight:800,color:item.confidence>=70?sig.color:item.confidence>=45?"#fbbf24":"rgba(255,255,255,0.25)"}}>{item.confidence}%</span>
        </div>
      </div>
      {open && (
        <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid rgba(255,255,255,0.05)",animation:"fadeIn .2s ease"}}>
          {item.summary && <div style={{fontSize:12,color:"rgba(255,255,255,0.5)",lineHeight:1.7,marginBottom:10,fontStyle:"italic"}}>{item.summary}</div>}
          <div style={{fontSize:13,color:"rgba(255,255,255,0.82)",lineHeight:1.75,marginBottom:14}}>{item.reasoning}</div>
          {(item.bull || item.bear) && (
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
              {item.bull && <div style={{flex:1,minWidth:80,background:"rgba(74,222,128,0.06)",border:"1px solid rgba(74,222,128,0.15)",borderRadius:8,padding:"9px 12px"}}>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.25)",marginBottom:3}}>↑ БЫЧИЙ</div>
                <div style={{fontSize:16,fontWeight:800,color:"#4ade80"}}>{Number(item.bull).toLocaleString()}</div>
              </div>}
              {item.bear && <div style={{flex:1,minWidth:80,background:"rgba(248,113,113,0.06)",border:"1px solid rgba(248,113,113,0.15)",borderRadius:8,padding:"9px 12px"}}>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.25)",marginBottom:3}}>↓ МЕДВЕЖИЙ</div>
                <div style={{fontSize:16,fontWeight:800,color:"#f87171"}}>{Number(item.bear).toLocaleString()}</div>
              </div>}
              <div style={{flex:1,minWidth:80,background:"rgba(251,191,36,0.06)",border:"1px solid rgba(251,191,36,0.15)",borderRadius:8,padding:"9px 12px"}}>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.25)",marginBottom:3}}>⏱ ОКНО</div>
                <div style={{fontSize:13,fontWeight:800,color:"#fbbf24"}}>{item.timeframe}</div>
              </div>
            </div>
          )}
          {item.tickers?.length > 0 && (
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
              {item.tickers.map(t => <span key={t} style={{background:"rgba(255,255,255,0.05)",border:`1px solid ${sig.color}33`,color:sig.color,borderRadius:5,padding:"3px 9px",fontSize:11,fontWeight:700}}>{t}</span>)}
            </div>
          )}
          {item.risk && <div style={{fontSize:11,color:"#fbbf24",background:"rgba(251,191,36,0.06)",border:"1px solid rgba(251,191,36,0.15)",borderRadius:7,padding:"8px 12px"}}>⚠️ {item.risk}</div>}
        </div>
      )}
    </div>
  );
}

function Skeleton() {
  return (
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {[...Array(6)].map((_,i) => (
        <div key={i} style={{height:74,borderRadius:12,borderLeft:"3px solid rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.04)",background:"linear-gradient(90deg,rgba(255,255,255,0.02) 25%,rgba(255,255,255,0.05) 50%,rgba(255,255,255,0.02) 75%)",backgroundSize:"200% 100%",animation:`shimmer 1.6s ease infinite`,animationDelay:`${i*0.1}s`}}/>
      ))}
      <div style={{textAlign:"center",marginTop:10,fontSize:11,color:"rgba(255,255,255,0.18)",letterSpacing:2}}>AI АНАЛИЗИРУЕТ РЫНОК...</div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────

function App() {
  const [asset, setAsset] = useState("NQ");
  const [sigFilter, setSigFilter] = useState("ALL");
  const [feed, setFeed] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [lastUpdate, setLastUpdate] = useState(null);
  const [countdown, setCountdown] = useState(60);
  const [freshIds, setFreshIds] = useState(new Set());
  const [manualText, setManualText] = useState("");
  const cdRef = useRef(null);
  const timerRef = useRef(null);

  const fetchNews = useCallback(async (assetId) => {
    setLoading(true); setError(null);
    const assetObj = ASSETS.find(a => a.id === assetId) || ASSETS[1];
    try {
      const txt = await callGemini(makePrompt(assetObj.label), `Generate 8 news items for ${assetObj.label}. JSON array only.`);
      const parsed = extractJSON(txt);
      if (!parsed) throw new Error("Не удалось распарсить ответ. Попробуй ещё раз.");
      const arr = Array.isArray(parsed) ? parsed : [parsed];
      const stamped = arr.map(item => ({ ...item, id: Math.random().toString(36).slice(2), assetId }));
      const ids = new Set(stamped.map(i => i.id));
      setFreshIds(ids); setTimeout(() => setFreshIds(new Set()), 12000);
      setFeed(stamped); setLastUpdate(new Date()); setCountdown(60);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }, []);

  useEffect(() => {
    setFeed([]); fetchNews(asset);
    clearInterval(timerRef.current);
    timerRef.current = setInterval(() => fetchNews(asset), 60000);
    return () => clearInterval(timerRef.current);
  }, [asset, fetchNews]);

  useEffect(() => {
    cdRef.current = setInterval(() => setCountdown(c => c > 0 ? c-1 : 60), 1000);
    return () => clearInterval(cdRef.current);
  }, []);

  const submitManual = async () => {
    if (!manualText.trim()) return;
    const title = manualText.trim(); setManualText(""); setLoading(true);
    const assetObj = ASSETS.find(a => a.id === asset) || ASSETS[1];
    try {
      const sys = `Analyze this headline for ${assetObj.label} traders. Return ONLY a JSON object with: title, summary, source ("Manual"), time ("сейчас"), signal, type, strength, confidence, urgency, timeframe, reasoning (Russian), bull, bear, risk (Russian), tickers, sentiment.`;
      const txt = await callGemini(sys, `HEADLINE: ${title}`);
      const parsed = extractJSON(txt);
      if (parsed) {
        const item = { ...parsed, title: parsed.title || title, source:"Manual", time:"сейчас", id: Math.random().toString(36).slice(2), assetId: asset };
        setFreshIds(new Set([item.id])); setTimeout(() => setFreshIds(new Set()), 12000);
        setFeed(prev => [item, ...prev]);
      }
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  const filtered = feed.filter(item => sigFilter === "ALL" || item.signal === sigFilter);
  const stats = { LONG: feed.filter(i=>i.signal==="LONG").length, SHORT: feed.filter(i=>i.signal==="SHORT").length, HIGH: feed.filter(i=>i.urgency==="HIGH").length };

  return (
    <div style={{minHeight:"100vh",background:"#080c14",color:"#e2e8f0",fontFamily:"'DM Mono','Courier New',monospace",overflowX:"hidden"}}>

      {/* Header */}
      <div style={{background:"rgba(255,255,255,0.02)",borderBottom:"1px solid rgba(255,255,255,0.05)",padding:"14px 20px",position:"sticky",top:0,zIndex:100,backdropFilter:"blur(10px)"}}>
        <div style={{maxWidth:800,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
          <div>
            <div style={{display:"flex",alignItems:"baseline",gap:7}}>
              <span style={{fontFamily:"'Orbitron',monospace",fontSize:18,fontWeight:900,color:"#fff",letterSpacing:3}}>MARKET</span>
              <span style={{fontFamily:"'Orbitron',monospace",fontSize:18,fontWeight:900,color:"#f87171",letterSpacing:3}}>DEVILS</span>
            </div>
            <div style={{fontSize:8,color:"rgba(255,255,255,0.18)",letterSpacing:3,marginTop:1}}>AI SIGNAL INTELLIGENCE · GEMINI</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{display:"flex",gap:10}}>
              <span style={{fontSize:11,color:"#4ade80"}}>▲{stats.LONG}</span>
              <span style={{fontSize:11,color:"#f87171"}}>▼{stats.SHORT}</span>
              {stats.HIGH>0 && <span style={{fontSize:11,color:"#f87171",animation:"blink 1.5s infinite"}}>⚡{stats.HIGH}</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              {loading
                ? <><div style={{width:6,height:6,borderRadius:"50%",background:"#fbbf24",animation:"blink 1s infinite"}}/><span style={{fontSize:10,color:"#fbbf24"}}>АНАЛИЗ...</span></>
                : <><div style={{width:6,height:6,borderRadius:"50%",background:"#4ade80"}}/><span style={{fontSize:10,color:"#4ade80"}}>LIVE · {countdown}s</span></>
              }
            </div>
          </div>
        </div>
      </div>

      <div style={{maxWidth:800,margin:"0 auto",padding:"18px 16px"}}>

        {/* Asset pills */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
          {ASSETS.map(a => (
            <button key={a.id} onClick={() => setAsset(a.id)} style={{
              display:"flex",alignItems:"center",gap:5,
              background: asset===a.id ? `${a.color}14` : "rgba(255,255,255,0.03)",
              border: `1px solid ${asset===a.id ? a.color : "rgba(255,255,255,0.07)"}`,
              color: asset===a.id ? a.color : "rgba(255,255,255,0.3)",
              borderRadius:8, padding:"7px 13px", fontSize:11,
              fontFamily:"inherit", fontWeight: asset===a.id?700:400, transition:"all .2s",
            }}>{a.flag} {a.label}</button>
          ))}
          <button onClick={() => fetchNews(asset)} disabled={loading} style={{marginLeft:"auto",background:"rgba(74,222,128,0.07)",border:"1px solid rgba(74,222,128,0.2)",color:"#4ade80",borderRadius:8,padding:"7px 14px",fontSize:12,fontFamily:"inherit"}}>↻</button>
        </div>

        {/* Signal filter */}
        <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
          {["ALL","LONG","SHORT","WAIT","AVOID"].map(f => {
            const sc = SIG[f];
            return <button key={f} onClick={() => setSigFilter(f)} style={{background:sigFilter===f?(sc?.bg||"rgba(255,255,255,0.05)"):"transparent",border:`1px solid ${sigFilter===f?(sc?.color||"rgba(255,255,255,0.2)"):"rgba(255,255,255,0.06)"}`,color:sigFilter===f?(sc?.color||"#e2e8f0"):"rgba(255,255,255,0.22)",borderRadius:6,padding:"5px 12px",fontSize:10,fontFamily:"inherit",fontWeight:700}}>{f}</button>;
          })}
          <span style={{fontSize:10,color:"rgba(255,255,255,0.18)",marginLeft:"auto"}}>{filtered.length} сигналов</span>
        </div>

        {/* Manual input */}
        <div style={{display:"flex",gap:8,marginBottom:20}}>
          <input value={manualText} onChange={e=>setManualText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submitManual()}
            placeholder="Вставь твит / заголовок → Enter"
            style={{flex:1,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,color:"#e2e8f0",fontSize:12,padding:"10px 14px",fontFamily:"inherit"}}/>
          <button onClick={submitManual} disabled={!manualText.trim()||loading} style={{background:"rgba(74,222,128,0.08)",border:"1px solid rgba(74,222,128,0.25)",color:"#4ade80",borderRadius:8,padding:"10px 18px",fontSize:13,fontFamily:"inherit",fontWeight:700}}>→</button>
        </div>

        {/* Error */}
        {error && (
          <div style={{background:"rgba(248,113,113,0.07)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
            <span style={{color:"#f87171",fontSize:12}}>❌ {error}</span>
            <button onClick={()=>fetchNews(asset)} style={{fontSize:11,color:"#4ade80",background:"rgba(74,222,128,0.08)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:6,padding:"4px 12px",fontFamily:"inherit",whiteSpace:"nowrap"}}>Повторить</button>
          </div>
        )}

        {loading && feed.length===0 && <Skeleton/>}
        {!loading && !error && filtered.length===0 && feed.length>0 && <div style={{textAlign:"center",padding:"60px 0",color:"rgba(255,255,255,0.18)",fontSize:12}}>Нет сигналов по фильтру</div>}
        {filtered.map(item => <Card key={item.id} item={item} isNew={freshIds.has(item.id)}/>)}

        <div style={{marginTop:32,display:"flex",justifyContent:"space-between",fontSize:9,color:"rgba(255,255,255,0.07)",letterSpacing:1.5}}>
          <span>MARKET DEVILS © 2026</span>
          <span>NOT FINANCIAL ADVICE</span>
          <span>{lastUpdate ? lastUpdate.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit",second:"2-digit"}) : "--:--:--"}</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
